apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-agent
  namespace: claims-agent
  labels:
    app: claims-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claims-agent
  template:
    metadata:
      labels:
        app: claims-agent
    spec:
      containers:
        - name: claims-agent
          image: geico/insurance-claims-agent:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: claims-agent-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /api/claims/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/claims/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: claims-agent-service
  namespace: claims-agent
spec:
  type: ClusterIP
  selector:
    app: claims-agent
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claims-agent-hpa
  namespace: claims-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: claims-agent
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
