apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claims-agent-ingress
  namespace: claims-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: claims-agent.geico.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: claims-agent-service
                port:
                  number: 80
